{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>用户生命周期详情</h2>

    <div style="margin:1rem 0; padding:1rem; background:#f5f5f5;">
        <h4>数据洞察</h4>
        <p>{{ insight }}</p>
    </div>

    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>生命周期阶段</th>
                <th>用户数</th>
                <th>流失人数</th>
                <th>流失率</th>
            </tr>
        </thead>
        <tbody>
        {% for item in seg_rows %}
            <tr>
                <td>{{ item.TenureGroup }}</td>
                <td>{{ item.用户数 }}</td>
                <td>{{ item.流失人数 }}</td>
                <td>{{ item.流失率展示 }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
